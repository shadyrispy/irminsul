name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────
  # Job 1: Rust 单元测试
  # ──────────────────────────────────────
  rust-test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            auto-artifactarium -> target
            rust-parser -> target

      - name: Test auto-artifactarium
        working-directory: auto-artifactarium
        run: cargo test --verbose

      - name: Test rust-parser
        working-directory: rust-parser
        run: cargo test --verbose

  # ──────────────────────────────────────
  # Job 2: 编译 Rust Android 库
  # ──────────────────────────────────────
  rust-build:
    name: Build Rust Libraries (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64
          - target: i686-linux-android
            abi: x86
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            auto-artifactarium -> target
            rust-parser -> target

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build auto-artifactarium for ${{ matrix.target }}
        working-directory: auto-artifactarium
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CARGO_TARGET_I686_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android21-clang
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Rust library
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.abi }}
          path: auto-artifactarium/target/${{ matrix.target }}/release/libauto_artifactarium.so
          retention-days: 1

  # ──────────────────────────────────────
  # Job 3: 编译 Android APK
  # ──────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Rust libraries
        uses: actions/download-artifact@v4
        with:
          path: rust-libs
          merge-multiple: false

      - name: Prepare jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

          cp rust-libs/rust-lib-arm64-v8a/libauto_artifactarium.so app/src/main/jniLibs/arm64-v8a/
          cp rust-libs/rust-lib-armeabi-v7a/libauto_artifactarium.so app/src/main/jniLibs/armeabi-v7a/
          cp rust-libs/rust-lib-x86_64/libauto_artifactarium.so app/src/main/jniLibs/x86_64/
          cp rust-libs/rust-lib-x86/libauto_artifactarium.so app/src/main/jniLibs/x86/

          echo "jniLibs contents:"
          find app/src/main/jniLibs -type f

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build Debug APK
        run: |
          echo "ndk.path=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          ./gradlew assembleDebug 2>&1

      - name: Build Release APK
        run: ./gradlew assembleRelease 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ──────────────────────────────────────
  # Job 4: Android 仪器测试（可选，需要模拟器）
  # ──────────────────────────────────────
  android-test:
    name: Android Instrumented Tests
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run lint
        run: ./gradlew lintDebug 2>&1 || true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
